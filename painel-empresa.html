<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel da Empresa - CarreiraHub</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <style>
        .stat-card {
            border-left: 4px solid #0d6efd;
            padding: 20px;
            border-radius: 8px;
            background: #f8f9fa;
        }

        .stat-card h4 {
            color: #0d6efd;
            font-weight: bold;
        }

        .vaga-card {
            border-left: 4px solid #28a745;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="index.html">
            <i class="bi bi-briefcase text-primary"></i> CarreiraHub
        </a>

        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="index.html">Home</a>
                </li>
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">
                        <i class="bi bi-person-circle"></i> Minha Conta
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" href="#" onclick="logout()">Sair</a></li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- MAIN -->
<main class="min-vh-100 py-5" style="background:#f8f9fa;">
<div class="container">

    <!-- HEADER -->
    <div class="row mb-5">
        <div class="col-lg-8">
            <h1 class="fw-bold mb-2">
                <i class="bi bi-speedometer2 text-primary me-2"></i>
                Painel da Empresa
            </h1>
            <p class="text-muted">Gerencie suas vagas e candidatos</p>
        </div>
    </div>

    <!-- SAUDAÇÃO -->
    <div class="alert alert-info mb-4">
        Bem-vindo, <strong><span id="nomeEmpresaDisplay">Empresa</span></strong>
    </div>

    <!-- ESTATÍSTICAS -->
    <div class="row mb-5">
        <div class="col-md-4 mb-3">
            <div class="card stat-card">
                <h4>0</h4>
                <p class="text-muted mb-0">Vagas Publicadas</p>
            </div>
        </div>

        <div class="col-md-4 mb-3">
            <div class="card stat-card">
                <h4>0</h4>
                <p class="text-muted mb-0">Candidaturas Recebidas</p>
            </div>
        </div>

        <div class="col-md-4 mb-3">
            <div class="card stat-card">
                <h4>0</h4>
                <p class="text-muted mb-0">Candidatos em Análise</p>
            </div>
        </div>
    </div>

    <!-- VAGAS -->
    <div class="card shadow mb-5">
        <div class="card-header bg-primary text-white">
            <h5 class="mb-0">Suas Vagas Publicadas</h5>
        </div>
        <div class="card-body">
            <div id="vagasPublicadasContainer">
                <div class="text-center py-5">
                    <div class="spinner-border text-primary"></div>
                    <p class="mt-3 text-muted">Carregando vagas...</p>
                </div>
            </div>
        </div>
    </div>

</div>
</main>

<footer class="bg-dark text-light py-4 mt-5 text-center">
    &copy; 2026 CarreiraHub
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/auth.js"></script>

<script>
document.addEventListener('DOMContentLoaded', async function () {

    if (!authManager.isLoggedIn()) {
        window.location.href = 'login.html';
        return;
    }

    const user = authManager.getCurrentUser();
    document.getElementById('nomeEmpresaDisplay').textContent =
        user?.nomeEmpresa || user?.email || "Empresa";

    const idCompany = localStorage.getItem("idCompany");

    if (!idCompany) {
        alert("Empresa não identificada.");
        return;
    }

    try {
        const response = await fetch(`http://127.0.0.1:3000/vagas/company/${idCompany}`);
        const vagas = await response.json();

        const container = document.getElementById("vagasPublicadasContainer");

        const totalVagas = vagas.length;
        const totalCandidaturas = vagas.reduce((acc, vaga) =>
            acc + (vaga._count?.applies || 0), 0);

        document.querySelectorAll(".stat-card h4")[0].textContent = totalVagas;
        document.querySelectorAll(".stat-card h4")[1].textContent = totalCandidaturas;

        if (vagas.length === 0) {
            container.innerHTML = `
                <div class="text-center py-5">
                    <p class="text-muted">Você ainda não publicou nenhuma vaga</p>
                </div>
            `;
            return;
        }

        container.innerHTML = "";

        vagas.forEach(vaga => {
            container.innerHTML += `
                <div class="card mb-4 vaga-card shadow-sm">
                    <div class="card-body">
                        <div class="d-flex justify-content-between">
                            <div>
                                <h5 class="fw-bold">${vaga.title}</h5>
                                <p class="text-muted mb-1">
                                    <i class="bi bi-geo-alt"></i> ${vaga.location}
                                </p>
                                <span class="badge bg-primary">${vaga.type}</span>
                                <span class="badge bg-secondary">${vaga.experience}</span>
                                <p class="mt-2">${vaga.description || ""}</p>
                                <small class="text-muted">
                                    Salário: ${vaga.minSalary}
                                    ${vaga.maxSalary ? " - " + vaga.maxSalary : ""}
                                </small>
                            </div>
                            <div class="text-end">
                                <span class="badge bg-success mb-2">
                                    ${vaga._count?.applies || 0} candidaturas
                                </span>
                                <br>
                                <button class="btn btn-sm btn-outline-primary mt-2"
                                    onclick="toggleCandidatos(${vaga.id})">
                                    Ver Candidatos
                                </button>
                            </div>
                        </div>

                        <div id="candidatos-${vaga.id}" class="mt-4 d-none">
                            <div class="text-center py-3">
                                <div class="spinner-border text-primary"></div>
                            </div>
                        </div>

                    </div>
                </div>
            `;
        });

    } catch (error) {
        console.error(error);
        alert("Erro ao carregar vagas.");
    }
});

async function toggleCandidatos(idVaga) {

    const container = document.getElementById(`candidatos-${idVaga}`);

    if (!container.classList.contains("d-none") && container.dataset.loaded === "true") {
        container.classList.add("d-none");
        return;
    }

    container.classList.remove("d-none");

    if (container.dataset.loaded === "true") return;

    try {
        const response = await fetch(`http://127.0.0.1:3000/applies/vaga/${idVaga}`);
        const candidatos = await response.json();

        if (candidatos.length === 0) {
            container.innerHTML = `
                <div class="alert alert-light text-center">
                    Nenhum candidato ainda.
                </div>
            `;
            container.dataset.loaded = "true";
            return;
        }

        let html = `<h6 class="fw-bold mb-3">Candidatos:</h6>`;

        candidatos.forEach(c => {
            html += `
                <div class="card mb-3 border">
                    <div class="card-body">
                        <h6 class="fw-bold">${c.student.fullName}</h6>
                        <p class="mb-1"><strong>Email:</strong> ${c.student.email}</p>
                        <p class="mb-1"><strong>Telefone:</strong> ${c.student.telphone}</p>
                        <p class="mb-1"><strong>Escola:</strong> ${c.student.school}</p>
                        <p class="mb-1"><strong>Área:</strong> ${c.student.areaInterest}</p>
                        <p class="mb-1"><strong>Skills:</strong> ${c.student.skills}</p>
                        <span class="badge bg-warning text-dark">
                            ${c.status}
                        </span>
                    </div>
                </div>
            `;
        });

        container.innerHTML = html;
        container.dataset.loaded = "true";

    } catch (error) {
        container.innerHTML = `
            <div class="alert alert-danger">
                Erro ao carregar candidatos.
            </div>
        `;
    }
}

function logout() {
    if (confirm("Deseja realmente sair?")) {
        authManager.logout();
    }
}
</script>

</body>
</html>
