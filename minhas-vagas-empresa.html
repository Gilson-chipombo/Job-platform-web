<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minhas Vagas - CarreiraHub</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body data-require-auth="true">

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="index.html">
            <i class="fas fa-briefcase text-primary"></i> CarreiraHub
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="painel-empresa.html">Painel</a></li>
                <li class="nav-item"><a class="nav-link active" aria-current="page" href="minhas-vagas-empresa.html">Minhas Vagas</a></li>
                <li class="nav-item"><a class="nav-link" href="publicar-vaga.html">Publicar Vaga</a></li>
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">
                        <i class="bi bi-person-circle"></i> Minha Conta
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" href="painel-empresa.html">
                            <i class="bi bi-speedometer2"></i> Painel</a></li>
                        <li><a class="dropdown-item" href="publicar-vaga.html">
                            <i class="bi bi-file-earmark-plus"></i> Publicar Vaga</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item text-danger" href="#" onclick="logout()">
                            <i class="bi bi-box-arrow-right"></i> Sair</a></li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- Header -->
<header class="page-header">
    <div class="container">
        <h1 class="fw-bold mb-3"><i class="bi bi-briefcase me-2"></i>Minhas Vagas</h1>
        <p class="lead">Veja e gerencie as vagas que você publicou em um só lugar.</p>
    </div>
</header>

<main class="py-5 page-main">
    <div class="container">
        <div class="row g-4" id="vagasCardsContainer">
            <div class="col-12 text-center py-5" id="vagasLoading">
                <div class="spinner-border text-primary"></div>
                <p class="mt-3 text-muted">Carregando suas vagas...</p>
            </div>
        </div>

        <div id="vagasEmpty" class="text-center text-muted mt-5" style="display: none;">
            <i class="bi bi-briefcase fs-1 mb-3"></i>
            <p class="mb-0">Você ainda não publicou nenhuma vaga.</p>
            <a href="publicar-vaga.html" class="btn btn-outline-primary mt-3">Publicar primeira vaga</a>
        </div>
    </div>
</main>

<footer class="bg-dark text-light py-4 mt-5">
    <div class="container text-center small">
        &copy; 2026 CarreiraHub
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/auth.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', async function () {
        if (!authManager.isLoggedIn()) {
            window.location.href = 'login.html';
            return;
        }

        const idCompany = localStorage.getItem('idCompany');
        if (!idCompany) return;

        try {
            const response = await fetch(`http://127.0.0.1:3000/vagas/company/${idCompany}`);
            const vagas = await response.json();

            const container = document.getElementById('vagasCardsContainer');
            document.getElementById('vagasLoading').style.display = 'none';

            if (vagas.length === 0) {
                document.getElementById('vagasEmpty').style.display = 'block';
                return;
            }

            container.innerHTML = '';

            vagas.forEach(vaga => {
                container.innerHTML += `
                    <div class="col-12">
                        <div class="card vaga-card shadow-sm">
                            <div class="row g-0 align-items-center">
                                <div class="col-md-8 p-4">
                                    <h5 class="fw-bold mb-1">${vaga.title}</h5>
                                    <p class="text-muted mb-2">${vaga.location}</p>
                                    <div class="mb-2">
                                        <span class="badge bg-primary me-1">${vaga.type}</span>
                                        <span class="badge bg-secondary">${vaga.experience}</span>
                                    </div>
                                </div>
                                <div class="col-md-4 p-4 border-start d-flex flex-column justify-content-between">
                                    <div class="text-end">
                                        <span class="badge bg-success mb-2">
                                            ${vaga._count?.applies || 0} candidaturas
                                        </span>
                                    </div>
                                    <div class="d-grid gap-2">
                                        <button class="btn btn-sm btn-outline-primary" onclick="toggleCandidatos(${vaga.id})">
                                            Ver Candidatos
                                        </button>
                                        <a href="publicar-vaga.html?id=${vaga.id}" class="btn btn-sm btn-outline-secondary">
                                            Editar
                                        </a>
                                    </div>
                                </div>
                            </div>
                            <div id="candidatos-${vaga.id}" class="mt-3 px-4 d-none"></div>
                        </div>
                    </div>
                `;
            });

        } catch (error) {
            console.error(error);
        }
    });

    async function toggleCandidatos(idVaga) {
        const container = document.getElementById(`candidatos-${idVaga}`);

        if (!container) return;

        if (!container.classList.contains('d-none') && container.dataset.loaded === 'true') {
            container.classList.add('d-none');
            return;
        }

        container.classList.remove('d-none');

        if (container.dataset.loaded === 'true') return;

        container.innerHTML = `
            <div class="text-center py-3">
                <div class="spinner-border text-primary"></div>
            </div>
        `;

        try {
            const response = await fetch(`http://127.0.0.1:3000/applies/vaga/${idVaga}`);
            const candidatos = await response.json();

            if (candidatos.length === 0) {
                container.innerHTML = "<div class='alert alert-light'>Nenhum candidato ainda.</div>";
                container.dataset.loaded = 'true';
                return;
            }

            let html = `
                <div class="table-responsive">
                    <table class="table table-bordered table-hover">
                        <thead class="table-light">
                            <tr>
                                <th>Nome</th>
                                <th>Email</th>
                                <th>Telefone</th>
                                <th>Escola</th>
                                <th>Área</th>
                                <th>Skills</th>
                                <th>CV</th>
                                <th>Status</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody>
            `;

            candidatos.forEach(c => {
                html += `
                    <tr>
                        <td>${c.student.fullName}</td>
                        <td>${c.student.email}</td>
                        <td>${c.student.telphone}</td>
                        <td>${c.student.school}</td>
                        <td>${c.student.areaInterest}</td>
                        <td>${c.student.skills}</td>
                        <td>
                            ${c.cvUrl ? `<a href="${c.cvUrl}" target="_blank" class="btn btn-sm btn-outline-primary">Ver CV</a>` : 'CV não disponível'}
                        </td>
                        <td>
                            <span class="badge bg-warning text-dark" id="candidate-status-${c.id}">${c.status || 'Pendente'}</span>
                        </td>
                        <td>
                            <div class="d-flex gap-2">
                                <button class="btn btn-sm btn-success" onclick="setCandidateStatus(${c.id}, 'Aprovado')">Aprovar</button>
                                <button class="btn btn-sm btn-danger" onclick="setCandidateStatus(${c.id}, 'Rejeitado')">Rejeitar</button>
                            </div>
                        </td>
                    </tr>
                `;
            });

            html += `</tbody></table></div>`;
            container.innerHTML = html;
            container.dataset.loaded = 'true';

        } catch (error) {
            container.innerHTML = "<div class='alert alert-danger'>Erro ao carregar candidatos.</div>";
        }
    }

    function setCandidateStatus(candidateId, status) {
        const statusEl = document.getElementById(`candidate-status-${candidateId}`);
        if (!statusEl) return;

        statusEl.textContent = status;
        statusEl.className = `badge ${status === 'Aprovado' ? 'bg-success' : 'bg-danger'} text-white`;
    }

    function logout() {
        if (confirm('Tem certeza que deseja sair?')) {
            authManager.logout();
        }
    }
</script>
</body>
</html>
