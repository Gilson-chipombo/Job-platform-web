<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Usuários - Painel Administrativo CarreiraHub</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <link rel="stylesheet" href="../css/painel-styles.css">

</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">

            <button class="btn btn-link text-white d-md-none me-2 p-0" type="button" data-bs-toggle="collapse"
                data-bs-target="#sidebarMenu" aria-controls="sidebarMenu" aria-expanded="false" aria-label="Abrir menu">
                <i class="bi bi-list fs-4"></i>
            </button>

            <a class="navbar-brand d-flex align-items-center" href="dashboard.html">
                <i class="bi bi-shield-lock me-2"></i>
                CarreiraHub Admin
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Alternar navegação">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto"></ul>
            </div>

        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">

            <!-- SIDEBAR -->
            <nav id="sidebarMenu" class="col-md-2 d-md-block sidebar collapse" aria-label="Sidebar">

                <ul class="sidebar-menu">

                    <li>
                        <a href="dashboard.html">
                            <i class="bi bi-speedometer2"></i>
                            Dashboard
                        </a>
                    </li>

                    <li>
                        <a href="usuarios.html" class="active">
                            <i class="bi bi-people"></i>
                            Usuários
                        </a>
                    </li>

                    <li>
                        <a href="perfil-admin.html">
                            <i class="bi bi-person-circle"></i>
                            Perfil
                        </a>
                    </li>

                    <li>
                        <a href="admins.html">
                            <i class="bi bi-shield-lock"></i>
                            Administradores
                        </a>
                    </li>

                    <li>
                        <a href="configuracoes.html">
                            <i class="bi bi-gear"></i>
                            Configurações
                        </a>
                    </li>

                    <li>
                        <a href="#" onclick="logoutAdmin(); return false;">
                            <i class="bi bi-box-arrow-right"></i>
                            Sair
                        </a>
                    </li>

                </ul>
            </nav>

            <!-- MAIN -->
            <main class="col-md-10 main-content">

                <div class="page-header">
                    <h1><i class="bi bi-people"></i> Gerenciamento de Usuários</h1>
                    <p>Controle e aprovação de contas</p>
                </div>


                <!-- FILTROS -->
                <div class="filter-section">

                    <div class="row g-3">

                        <div class="col-md-4">
                            <label class="form-label"><i class="bi bi-search me-2"></i>Buscar</label>
                            <input type="text" class="form-control" id="searchInput"
                                placeholder="Nome, email ou telefone...">
                        </div>

                        <div class="col-md-2">
                            <label class="form-label"><i class="bi bi-tag me-2"></i>Tipo</label>

                            <select class="form-select" id="tipoFilter">
                                <option value="">Todos</option>
                                <option value="estudante"><i class="bi bi-person-badge"></i> Estudante</option>
                                <option value="empresa"><i class="bi bi-building"></i> Empresa</option>
                            </select>

                        </div>

                        <div class="col-md-2">
                            <label class="form-label"><i class="bi bi-check-circle me-2"></i>Status</label>

                            <select class="form-select" id="statusFilter">
                                <option value="">Todos</option>
                                <option value="aprovado">Aprovado</option>
                                <option value="pendente">Pendente</option>
                                <option value="rejeitado">Rejeitado</option>
                            </select>

                        </div>

                        <div class="col-md-2">
                            <label class="form-label"><i class="bi bi-lock me-2"></i>Bloqueio</label>

                            <select class="form-select" id="bloqueioFilter">
                                <option value="">Todos</option>
                                <option value="bloqueado">Bloqueados</option>
                                <option value="ativo">Ativos</option>
                            </select>

                        </div>

                        <div class="col-md-2 d-flex align-items-end gap-2">
                            <button class="btn btn-primary w-100" onclick="applyFilters()">
                                <i class="bi bi-funnel me-1"></i>Filtrar
                            </button>
                        </div>

                    </div>

                    <div class="row mt-2">

                        <div class="col-md-12">

                            <button class="btn btn-outline-secondary btn-sm" onclick="clearFilters()">
                                <i class="bi bi-arrow-clockwise me-1"></i>Limpar Filtros
                            </button>

                        </div>

                    </div>

                </div>


                <!-- TABELA -->

                <div class="table-wrapper">

                    <table class="table table-hover mb-0" id="usuariosTable">

                        <thead>

                            <tr>
                                <th>Nome</th>
                                <th>Email</th>
                                <th>Tipo</th>
                                <th>Telefone</th>
                                <th>Status</th>
                                <th>Data</th>
                                <th>Ações</th>
                            </tr>

                        </thead>

                        <tbody id="usuariosTableBody"></tbody>

                    </table>

                    <div class="no-data" id="emptyUsers" style="display:none">

                        <i class="bi bi-inbox"></i>

                        <p>Nenhum usuário encontrado</p>

                    </div>

                </div>

            </main>

        </div>
    </div>


    <!-- MODAL -->

    <div class="modal fade" id="userModal">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header bg-light">
                    <h5 class="modal-title" id="userModalTitle"></h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="userModalBody"></div>
                <div class="modal-footer bg-light">
                    <button class="btn btn-warning" id="btnAprovarModal" onclick="aprovarDoModal()"
                        style="display:none">
                        <i class="bi bi-check-circle me-2"></i>Aprovar
                    </button>
                    <button class="btn btn-danger" id="btnRejeitarModal" onclick="rejeitarDoModal()"
                        style="display:none">
                        <i class="bi bi-x-circle me-2"></i>Rejeitar
                    </button>
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
                </div>
            </div>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script src="../js/auth-painel.js"></script>
    <script>
        adminAuth.ensureAuthenticated();
    </script>
    <script src="../js/usuarios-manager.js"></script>

    <script>

        // Função para obter parâmetros da URL
        function getUrlParams() {
            const params = new URLSearchParams(window.location.search)
            return {
                tipo: params.get('tipo')
            }
        }

        document.addEventListener("DOMContentLoaded", async () => {

            await userManager.loadUsers()

            // Obter parâmetro tipo da URL
            const urlParams = getUrlParams()

            // Se houver parâmetro tipo na URL, pré-selecionar e aplicar o filtro
            if (urlParams.tipo) {
                document.getElementById("tipoFilter").value = urlParams.tipo
                applyFilters()
            } else {
                renderUsuarios(userManager.getAllUsers())
            }

        })


        function renderUsuarios(usuarios) {

            const tbody = document.getElementById("usuariosTableBody")
            const empty = document.getElementById("emptyUsers")

            if (!usuarios.length) {

                tbody.innerHTML = ""
                empty.style.display = "block"
                return

            }

            empty.style.display = "none"

            tbody.innerHTML = usuarios.map(user => `

<tr>

<td><strong>${user.nome}</strong></td>

<td>${user.email}</td>

<td>
<span class="badge bg-secondary">
${user.tipo}
</span>
</td>

<td>${user.telefone ?? "-"}</td>

<td>
<span class="badge bg-info">
${user.status}
</span>
</td>

<td>
${new Date(user.dataCadastr).toLocaleDateString()}
</td>

<td>

<button class="btn btn-sm btn-info" onclick="viewUser(${user.id})">
<i class="bi bi-eye"></i>
</button>

<button class="btn btn-sm btn-success" onclick="approveUser(${user.id}, '${user.tipo}')">
<i class="bi bi-check"></i>
</button>

<button class="btn btn-sm btn-danger" onclick="rejectUser(${user.id}, '${user.tipo}')">
<i class="bi bi-x"></i>
</button>

</td>

</tr>

`).join("")

        }


        function applyFilters() {
            let users = userManager.getAllUsers()

            const search = document.getElementById("searchInput").value.toLowerCase()
            const tipo = document.getElementById("tipoFilter").value
            const status = document.getElementById("statusFilter").value

            if (search) {
                users = users.filter(u =>
                    u.nome.toLowerCase().includes(search) ||
                    u.email.toLowerCase().includes(search) ||
                    (u.telefone && u.telefone.includes(search))
                )
            }

            if (tipo) {
                users = users.filter(u => u.tipo === tipo)
            }

            if (status) {
                users = users.filter(u => u.status === status)
            }
            renderUsuarios(users)
        }


        function clearFilters() {

            document.getElementById("searchInput").value = ""
            document.getElementById("tipoFilter").value = ""
            document.getElementById("statusFilter").value = ""

            renderUsuarios(userManager.getAllUsers())

        }



        async function approveUser(id, tipo) {

            if (!confirm("Aprovar usuário?")) return
            await userManager.approveUser(id, tipo)
            await userManager.loadUsers()
            applyFilters()
        }


        async function rejectUser(id, tipo) {

            if (!confirm("Rejeitar usuário?")) return

            await userManager.rejectUser(id, tipo)
            await userManager.loadUsers()
            applyFilters()
        }


        function viewUser(id) {
            const user = userManager.getUserById(id);

            if (!user) return;

            // Guardar ID do usuário para ações
            window.currentUserId = id;
            window.currentUserType = user.tipo;

            let html = `
        <div class="row">
            <div class="col-md-8">
    `;

            // Informações Básicas
            html += `
        <div class="card mb-3">
            <div class="card-header bg-primary text-white">
                <h6 class="mb-0"><i class="bi bi-person-circle me-2"></i>Informações Básicas</h6>
            </div>
            <div class="card-body">
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="text-muted small">Nome</label>
                        <p class="fw-bold">${user.nome}</p>
                    </div>
                    <div class="col-md-6">
                        <label class="text-muted small">Tipo</label>
                        <p>
                            <span class="badge bg-${user.tipo === 'estudante' ? 'info' : 'warning'} text-dark">
                                ${user.tipo.charAt(0).toUpperCase() + user.tipo.slice(1)}
                            </span>
                        </p>
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="text-muted small">Email</label>
                        <p><a href="mailto:${user.email}">${user.email}</a></p>
                    </div>
                    <div class="col-md-6">
                        <label class="text-muted small">Telefone</label>
                        <p>${user.telefone || '-'}</p>
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="text-muted small">Status</label>
                        <p>
                            <span class="badge bg-${user.status === 'aprovado' ? 'success' :
                    user.status === 'pendente' ? 'warning' : 'danger'
                }">
                                ${user.status.charAt(0).toUpperCase() + user.status.slice(1)}
                            </span>
                        </p>
                    </div>
                    <div class="col-md-6">
                        <label class="text-muted small">Data de Cadastro</label>
                        <p>${new Date(user.dataCadastr).toLocaleDateString('pt-BR')}</p>
                    </div>
                </div>
            </div>
        </div>
    `;

            // Informações Específicas
            if (user.tipo === 'estudante') {
                html += `
            <div class="card mb-3">
                <div class="card-header bg-info text-white">
                    <h6 class="mb-0"><i class="bi bi-mortarboard me-2"></i>Informações do Estudante</h6>
                </div>
                <div class="card-body">
                    <div class="mb-3">
                        <label class="text-muted small">Escola/Universidade</label>
                        <p>${user.escola || '-'}</p>
                    </div>
                    <div class="mb-3">
                        <label class="text-muted small">Habilidades</label>
                        <p>${user.skills ? user.skills.split(',').map(s => `<span class="badge bg-light text-dark">${s.trim()}</span>`).join(' ') : '-'}</p>
                    </div>
                </div>
            </div>
        `;
            } else if (user.tipo === 'empresa') {
                html += `
            <div class="card mb-3">
                <div class="card-header bg-warning text-dark">
                    <h6 class="mb-0"><i class="bi bi-building me-2"></i>Informações da Empresa</h6>
                </div>
                <div class="card-body">
                    <div class="mb-3">
                        <label class="text-muted small">Segmento</label>
                        <p>${user.segmento || '-'}</p>
                    </div>
                </div>
            </div>
        `;
            }

            html += `
            </div>
            <div class="col-md-4">
                <div class="card bg-light">
                    <div class="card-header">
                        <h6 class="mb-0"><i class="bi bi-info-circle me-2"></i>Status Conta</h6>
                    </div>
                    <div class="card-body">
                        <p class="small text-muted mb-2">Bloqueado:</p>
                        <p>
                            <span class="badge bg-${user.bloqueado ? 'danger' : 'success'}">
                                ${user.bloqueado ? 'SIM' : 'NÃO'}
                            </span>
                        </p>
                        
                        <hr>
                        
                        <p class="small text-muted mb-2">Status Atual:</p>
                        <p class="fw-bold">${user.status.toUpperCase()}</p>
                        
                        <hr>
                        
                        <p class="small text-muted mb-2">ID do Usuário:</p>
                        <p class="small font-monospace">${user.id}</p>
                    </div>
                </div>
            </div>
        </div>
    `;

            document.getElementById("userModalTitle").innerHTML = `
        <i class="bi bi-person-circle me-2"></i>${user.nome}
    `;
            document.getElementById("userModalBody").innerHTML = html;

            // Mostrar botões de ação apenas se pendente
            const btnAprovar = document.getElementById("btnAprovarModal");
            const btnRejeitar = document.getElementById("btnRejeitarModal");

            if (user.status === 'pendente') {
                btnAprovar.style.display = 'inline-block';
                btnRejeitar.style.display = 'inline-block';
            } else {
                btnAprovar.style.display = 'none';
                btnRejeitar.style.display = 'none';
            }

            new bootstrap.Modal(document.getElementById("userModal")).show();
        }

        // Funções para ações no modal
        async function aprovarDoModal() {
            const userId = window.currentUserId;
            const userType = window.currentUserType;

            if (confirm("Tem certeza que deseja aprovar este usuário?")) {
                await userManager.approveUser(userId, userType);
                await userManager.loadUsers();
                renderUsuarios(userManager.getAllUsers());
                bootstrap.Modal.getInstance(document.getElementById("userModal")).hide();
            }
        }

        async function rejeitarDoModal() {
            const userId = window.currentUserId;
            const userType = window.currentUserType;

            if (confirm("Tem certeza que deseja rejeitar este usuário?")) {
                await userManager.rejectUser(userId, userType);
                await userManager.loadUsers();
                renderUsuarios(userManager.getAllUsers());
                bootstrap.Modal.getInstance(document.getElementById("userModal")).hide();
            }
        }

    </script>

</body>

</html>
