<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil Admin - Painel Administrativo CarreiraHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/painel-styles.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <button class="btn btn-link text-white d-md-none me-2 p-0" type="button" data-bs-toggle="collapse" data-bs-target="#sidebarMenu" aria-controls="sidebarMenu" aria-expanded="false" aria-label="Abrir menu">
                <i class="bi bi-list fs-4"></i>
            </button>

            <a class="navbar-brand d-flex align-items-center" href="dashboard.html">
                <i class="bi bi-shield-lock me-2"></i>CarreiraHub Admin
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Alternar navegação">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <!-- Dropdown será inserido aqui pelo auth-painel.js -->
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <nav id="sidebarMenu" class="col-md-2 d-md-block sidebar collapse" aria-label="Sidebar">
                <ul class="sidebar-menu">
                    <li>
                        <a href="dashboard.html">
                            <i class="bi bi-speedometer2"></i>Dashboard
                        </a>
                    </li>
        
                    <li>
                        <a href="usuarios.html">
                            <i class="bi bi-people"></i>Usuários
                        </a>
                    </li>
                    <li>
                        <a href="perfil-admin.html" class="active">
                            <i class="bi bi-person-circle"></i>Perfil
                        </a>
                    </li>
                    <li>
                        <a href="admins.html">
                            <i class="bi bi-shield-lock"></i>Administradores
                        </a>
                    </li>
                    <li>
                        <a href="configuracoes.html">
                            <i class="bi bi-gear"></i>Configurações
                        </a>
                    </li>

                    <li>
                        <a href="#" onclick="logoutAdmin(); return false;">
                            <i class="bi bi-box-arrow-right"></i>Sair
                        </a>
                    </li>
                </ul>
            </nav>

            <!-- Main Content -->
            <main class="col-md-10 main-content">
                <div class="page-header">
                    <h1><i class="bi bi-person-circle"></i>Meu Perfil</h1>
                    <p>Informações e configurações da conta administrativo</p>
                </div>

                <div class="row">
                    <div class="col-md-8">
                        <!-- Informações do Perfil -->
                        <div class="card mb-4">
                            <div class="card-header bg-light">
                                <h5 class="mb-0">Informações Pessoais</h5>
                            </div>
                            <div class="card-body">
                                <div class="row mb-3">
                                    <div class="col-md-6">
                                        <label class="form-label">Nome Completo</label>
                                        <input type="text" class="form-control" id="adminNome" readonly>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label">Cargo</label>
                                        <input type="text" class="form-control" id="adminCargo" readonly>
                                    </div>
                                </div>

                                <div class="row mb-3">
                                    <div class="col-md-6">
                                        <label class="form-label">Email</label>
                                        <input type="email" class="form-control" id="adminEmail" readonly>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label">Telefone</label>
                                        <input type="tel" class="form-control" id="adminTelefone" placeholder="+244 900 000 000">
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label">Permissions (Papel)</label>
                                    <input type="text" class="form-control" id="adminPermissoes" readonly>
                                </div>
                            </div>
                        </div>

                        <!-- Alterar Senha -->
                        <div class="card">
                            <div class="card-header bg-light">
                                <h5 class="mb-0">Alterar Senha</h5>
                            </div>
                            <div class="card-body">
                                <form id="formAlterarSenha">
                                    <div class="mb-3">
                                        <label class="form-label">Senha Atual</label>
                                        <input type="password" class="form-control" id="senhaAtual" placeholder="••••••••" required>
                                    </div>

                                    <div class="mb-3">
                                        <label class="form-label">Nova Senha</label>
                                        <input type="password" class="form-control" id="novaSenha" placeholder="••••••••" required>
                                    </div>

                                    <div class="mb-3">
                                        <label class="form-label">Confirmar Senha</label>
                                        <input type="password" class="form-control" id="confirmarSenha" placeholder="••••••••" required>
                                    </div>

                                    <button type="submit" class="btn btn-primary">
                                        <i class="bi bi-check me-2"></i>Atualizar Senha
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>

                    <!-- Informações Adicionais -->
                    <div class="col-md-4">
                        <div class="card mb-4">
                            <div class="card-header bg-light">
                                <h5 class="mb-0">Status de Acesso</h5>
                            </div>
                            <div class="card-body">
                                <p class="mb-2">
                                    <i class="bi bi-check-circle text-success"></i>
                                    <strong>Status:</strong> <span id="statusAcesso">Autenticado</span>
                                </p>
                                <p class="mb-2">
                                    <i class="bi bi-shield-check text-success"></i>
                                    <strong>Permissões:</strong> <span id="statusPermissoes">Completas</span>
                                </p>
                                <p class="mb-2">
                                    <i class="bi bi-clock"></i>
                                    <strong>Último Login:</strong> <span id="ultimoLogin">-</span>
                                </p>
                                <p class="mb-0">
                                    <i class="bi bi-calendar-event"></i>
                                    <strong>Membro desde:</strong> <span id="membroDesde">-</span>
                                </p>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/auth-painel.js"></script>
    <script>
        adminAuth.ensureAuthenticated();
    </script>
    <script src="../js/usuarios-manager.js"></script>
    <script>
        // ============================================
        // GERENCIAR PERFIL DO ADMIN
        // ============================================

        const adminProfileManager = {
            currentAdmin: null,
            admins: [],

            async init() {
                console.log('Iniciando adminProfileManager...');
                
                // Sincronizar adminId do localStorage admin
                let adminId = localStorage.getItem('adminId');
                console.log('AdminId inicial:', adminId);
                
                const adminData = localStorage.getItem('admin');
                console.log('AdminData:', adminData);
                
                if (adminData && !adminId) {
                    try {
                        const parsed = JSON.parse(adminData);
                        if (parsed.id) {
                            localStorage.setItem('adminId', parsed.id);
                            adminId = parsed.id;
                            console.log('AdminId sincronizado:', adminId);
                        }
                    } catch (e) {
                        console.error('Erro ao parsear admin data:', e);
                    }
                }
                
                await this.loadCurrentAdmin();
                this.setupEventListeners();
            },

            /**
             * Carregar dados do admin logado do banco de dados
             */
            async loadCurrentAdmin() {
                try {
                    const adminId = localStorage.getItem('adminId');
                    console.log('Admin ID from localStorage:', adminId);
                    
                    // Fallback: carregar do localStorage se não tiver adminId
                    if (!adminId) {
                        const adminData = localStorage.getItem('admin');
                        console.log('Fallback - Usando dados do localStorage:', adminData);
                        
                        if (adminData) {
                            this.currentAdmin = JSON.parse(adminData);
                            this.displayCurrentAdmin();
                        } else {
                            console.error('ID do admin não encontrado e localStorage vazio');
                        }
                        return;
                    }

                    const response = await fetch(`http://127.0.0.1:3000/admin/${adminId}`);
                    console.log('Response status:', response.status);
                    
                    if (!response.ok) {
                        console.error('Erro na resposta:', response.statusText);
                        throw new Error('Erro ao carregar dados do admin');
                    }

                    const admin = await response.json();
                    console.log('Admin data from API:', admin);
                    
                    this.currentAdmin = admin;
                    this.displayCurrentAdmin();
                } catch (error) {
                    console.error('Erro ao carregar admin atual:', error);
                }
            },

            /**
             * Exibir dados do admin logado
             */
            displayCurrentAdmin() {
                if (!this.currentAdmin) return;

                document.getElementById('adminNome').value = this.currentAdmin.name || '';
                document.getElementById('adminEmail').value = this.currentAdmin.email || '';
                document.getElementById('adminTelefone').value = this.currentAdmin.phone || '';
                document.getElementById('adminCargo').value = this.currentAdmin.role || 'Administrador do Sistema';
                document.getElementById('adminPermissoes').value = 'Admin - Acesso Total';
                
                // Atualizar status
                document.getElementById('statusAcesso').textContent = 'Autenticado';
                document.getElementById('statusPermissoes').textContent = 'Completas';
                
                if (this.currentAdmin.createdAt) {
                    const criacao = new Date(this.currentAdmin.createdAt);
                    document.getElementById('membroDesde').textContent = criacao.toLocaleDateString('pt-BR');
                }
            },



            /**
             * Setup event listeners
             */
            setupEventListeners() {
                // Formulário de alterar senha
                const formSenha = document.getElementById('formAlterarSenha');
                if (formSenha) {
                    formSenha.addEventListener('submit', (e) => this.handleChangePassword(e));
                }
            },

            /**
             * Alterar senha
             */
            async handleChangePassword(e) {
                e.preventDefault();

                const senhaAtual = document.getElementById('senhaAtual').value;
                const novaSenha = document.getElementById('novaSenha').value;
                const confirmarSenha = document.getElementById('confirmarSenha').value;

                // Validações
                if (!senhaAtual || !novaSenha || !confirmarSenha) {
                    alert('Por favor, preencha todos os campos!');
                    return;
                }

                if (novaSenha !== confirmarSenha) {
                    alert('As novas senhas não correspondem!');
                    return;
                }

                if (novaSenha.length < 6) {
                    alert('A nova senha deve ter no mínimo 6 caracteres!');
                    return;
                }

                if (senhaAtual === novaSenha) {
                    alert('A nova senha deve ser diferente da atual!');
                    return;
                }

                try {
                    // Tentar obter adminId de várias fontes
                    let adminId = localStorage.getItem('adminId');
                    
                    if (!adminId && this.currentAdmin?.id) {
                        adminId = this.currentAdmin.id;
                    }
                    
                    if (!adminId) {
                        const adminData = localStorage.getItem('admin');
                        if (adminData) {
                            try {
                                const parsed = JSON.parse(adminData);
                                adminId = parsed.id;
                            } catch (e) {
                                console.error('Erro ao parsear admin data:', e);
                            }
                        }
                    }
                    
                    if (!adminId) {
                        alert('ID do admin não encontrado. Faça login novamente.');
                        console.error('AdminId não encontrado em nenhuma fonte');
                        console.log('localStorage adminId:', localStorage.getItem('adminId'));
                        console.log('currentAdmin id:', this.currentAdmin?.id);
                        console.log('admin data:', localStorage.getItem('admin'));
                        return;
                    }

                    console.log('Alterando senha para admin ID:', adminId);

                    const response = await fetch(`http://127.0.0.1:3000/admin/${adminId}/change-password`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            currentPassword: senhaAtual,
                            newPassword: novaSenha
                        })
                    });

                    const data = await response.json();

                    if (response.ok) {
                        alert('Senha alterada com sucesso!');
                        document.getElementById('formAlterarSenha').reset();
                    } else {
                        alert(data.message || 'Erro ao alterar senha');
                        console.error('Erro na resposta:', data);
                    }
                } catch (error) {
                    console.error('Erro ao alterar senha:', error);
                    alert('Erro ao alterar a senha. Tente novamente.');
                }
            }
        };

        // Inicializar quando a página carregar
        document.addEventListener('DOMContentLoaded', () => {
            adminProfileManager.init();
        });
    </script>
</body>
</html>
