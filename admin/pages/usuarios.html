<!-- MAIN -->
<main class="col-md-10 main-content">

<div class="page-header">
<h1><i class="bi bi-people"></i> Gerenciamento de Usuários</h1>
<p>Controle e aprovação de contas</p>
</div>


<!-- FILTROS -->
<div class="filter-section">

<div class="row g-3">

<div class="col-md-3">
<label class="form-label">Buscar</label>
<input type="text" class="form-control" id="searchInput" placeholder="Nome, email ou telefone...">
</div>

<div class="col-md-3">
<label class="form-label">Tipo</label>

<select class="form-select" id="tipoFilter">
<option value="">Todos</option>
<option value="estudante">Estudante</option>
<option value="empresa">Empresa</option>
</select>

</div>

<div class="col-md-3">
<label class="form-label">Status</label>

<select class="form-select" id="statusFilter">
<option value="">Todos</option>
<option value="aprovado">Aprovado</option>
<option value="pendente">Pendente</option>
<option value="rejeitado">Rejeitado</option>
</select>

</div>

<div class="col-md-3">
<label class="form-label">Bloqueio</label>

<select class="form-select" id="bloqueioFilter">
<option value="">Todos</option>
<option value="bloqueado">Bloqueados</option>
<option value="ativo">Ativos</option>
</select>

</div>

</div>

<div class="row mt-3">

<div class="col-md-12">

<button class="btn btn-primary" onclick="applyFilters()">
<i class="bi bi-funnel me-2"></i>
Aplicar Filtros
</button>

<button class="btn btn-secondary" onclick="clearFilters()">
<i class="bi bi-arrow-clockwise me-2"></i>
Limpar
</button>

</div>

</div>

</div>

<th>Email</th>
<th>Tipo</th>
<th>Telefone</th>
<th>Status</th>
<th>Data</th>
<th>Ações</th>
</tr>

</thead>

</table>

<div class="no-data" id="emptyUsers" style="display:none">

</div>

</div>

</div>


<!-- MODAL -->

<div class="modal fade" id="userModal">

<div class="modal-dialog modal-lg">

<div class="modal-content">

<div class="modal-header">
<h5 class="modal-title" id="userModalTitle"></h5>
<button class="btn-close" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body" id="userModalBody"></div>

<div class="modal-footer">
<button class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
</div>

</div>
</div>
</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script src="../js/auth-painel.js"></script>
<script>
    adminAuth.ensureAuthenticated();
</script>
<script src="../js/usuarios-manager.js"></script>

<script>

document.addEventListener("DOMContentLoaded", async () => {

await userManager.loadUsers()

renderUsuarios(userManager.getAllUsers())

})


function renderUsuarios(usuarios){

const tbody = document.getElementById("usuariosTableBody")
const empty = document.getElementById("emptyUsers")

if(!usuarios.length){

tbody.innerHTML=""
empty.style.display="block"
return

}

empty.style.display="none"

tbody.innerHTML = usuarios.map(user => `

<tr>

<td><strong>${user.nome}</strong></td>

<td>${user.email}</td>

<td>
<span class="badge bg-secondary">
${user.tipo}
</span>
</td>

<td>${user.telefone ?? "-"}</td>

<td>
<span class="badge bg-info">
${user.status}
</span>
</td>

<td>
${new Date(user.dataCadastr).toLocaleDateString()}
</td>

<td>

<button class="btn btn-sm btn-info" onclick="viewUser(${user.id})">
<i class="bi bi-eye"></i>
</button>

<button class="btn btn-sm btn-success" onclick="approveUser(${user.id}, '${user.tipo}')">
<i class="bi bi-check"></i>
</button>

<button class="btn btn-sm btn-danger" onclick="rejectUser(${user.id}, '${user.tipo}')">
<i class="bi bi-x"></i>
</button>

</td>

</tr>

`).join("")

}


function applyFilters(){
    let users = userManager.getAllUsers()

    const search = document.getElementById("searchInput").value.toLowerCase()
    const tipo = document.getElementById("tipoFilter").value
    const status = document.getElementById("statusFilter").value

    if(search){
        users = users.filter(u =>
        u.nome.toLowerCase().includes(search) ||
        u.email.toLowerCase().includes(search) ||
        (u.telefone && u.telefone.includes(search))
        )
    }

    if(tipo){
        users = users.filter(u => u.tipo === tipo)
    }

    if(status){
        users = users.filter(u => u.status === status)
    }
    renderUsuarios(users)
}


function clearFilters(){

document.getElementById("searchInput").value=""
document.getElementById("tipoFilter").value=""
document.getElementById("statusFilter").value=""

renderUsuarios(userManager.getAllUsers())

}



async function approveUser(id){

    if(!confirm("Aprovar usuário?")) return
    await userManager.approveUser(id)
    await userManager.loadUsers()
    renderUsuarios(userManager.getAllUsers())
}


async function rejectUser(id){

    if(!confirm("Rejeitar usuário?")) return

    await userManager.rejectUser(id)
    await userManager.loadUsers()
    renderUsuarios(userManager.getAllUsers())
}


function viewUser(id){

const user = userManager.getUserById(id)

const html = `

<p><strong>Nome:</strong> ${user.nome}</p>
<p><strong>Email:</strong> ${user.email}</p>
<p><strong>Telefone:</strong> ${user.telefone}</p>
<p><strong>Status:</strong> ${user.status}</p>

`

document.getElementById("userModalTitle").innerText=user.nome
document.getElementById("userModalBody").innerHTML=html

new bootstrap.Modal(document.getElementById("userModal")).show()

}

</script>
