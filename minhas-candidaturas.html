<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minhas Candidaturas - CarreiraHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="d-flex flex-column min-vh-100" data-require-auth="true">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">
                <i class="bi bi-briefcase text-primary"></i> CarreiraHub
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="vagas.html">Vagas</a></li>
                    <li class="nav-item"><a class="nav-link" href="sobre.html">Sobre</a></li>
                    <li class="nav-item"><a class="nav-link" href="contato.html">Contato</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="py-5" style="background: #f8f9fa; min-height: 100vh; flex: 1;">
        <div class="container">
            <h1 class="fw-bold mb-4"><i class="bi bi-file-earmark-text me-2 text-primary"></i>Minhas Candidaturas</h1>

            <div class="row">
                <!-- Filtros -->
                <div class="col-lg-3 mb-4">
                    <div class="card shadow-sm">
                        <div class="card-body">
                            <h5 class="fw-bold mb-4"><i class="bi bi-funnel me-2"></i>Filtros</h5>

                            <!-- Busca -->
                            <div class="mb-4">
                                <label for="searchApplications" class="form-label fw-bold">Buscar</label>
                                <input type="text" class="form-control" id="searchApplications" placeholder="Cargo, empresa...">
                            </div>

                            <!-- Status -->
                            <div class="mb-4">
                                <label class="form-label fw-bold">Status</label>
                                <div class="form-check">
                                    <input class="form-check-input filter-status" type="checkbox" id="statusAnalise" value="análise" checked>
                                    <label class="form-check-label" for="statusAnalise">
                                        <span class="badge bg-info">Em Análise</span>
                                    </label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input filter-status" type="checkbox" id="statusAceito" value="aceito" checked>
                                    <label class="form-check-label" for="statusAceito">
                                        <span class="badge bg-success">Aceito</span>
                                    </label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input filter-status" type="checkbox" id="statusRejeitado" value="rejeitado" checked>
                                    <label class="form-check-label" for="statusRejeitado">
                                        <span class="badge bg-danger">Rejeitado</span>
                                    </label>
                                </div>
                            </div>

                            <button class="btn btn-outline-secondary w-100" id="clearFiltersApp">Limpar Filtros</button>
                        </div>
                    </div>
                </div>

                <!-- Candidaturas List -->
                <div class="col-lg-9">
                    <div id="applicationsContainer">
                        <!-- Candidaturas serão renderizadas aqui -->
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-dark text-light py-5 mt-5">
        <div class="container">
            <div class="row mb-4">
                <div class="col-md-4 mb-4">
                    <h5 class="fw-bold mb-3"><i class="bi bi-briefcase me-2"></i>CarreiraHub</h5>
                    <p class="text-muted">Conectando talentos com oportunidades desde 2024.</p>
                </div>
                <div class="col-md-4 mb-4">
                    <h5 class="fw-bold mb-3">Links Úteis</h5>
                    <ul class="list-unstyled text-muted small">
                        <li><a href="sobre.html" class="text-decoration-none text-muted">Sobre Nós</a></li>
                        <li><a href="contato.html" class="text-decoration-none text-muted">Contato</a></li>
                        <li><a href="blog.html" class="text-decoration-none text-muted">Blog</a></li>
                    </ul>
                </div>
                <div class="col-md-4 mb-4">
                    <h5 class="fw-bold mb-3">Redes Sociais</h5>
                    <div class="d-flex gap-3">
                        <a href="#" class="text-decoration-none text-muted"><i class="bi bi-facebook"></i></a>
                        <a href="#" class="text-decoration-none text-muted"><i class="bi bi-linkedin"></i></a>
                    </div>
                </div>
            </div>
            <hr class="bg-secondary">
            <div class="text-center text-muted small">
                <p>&copy; 2024 CarreiraHub. Todos os direitos reservados.</p>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/navbar.js"></script>
    <script src="js/candidates-applications.js"></script>
</body>
</html>
