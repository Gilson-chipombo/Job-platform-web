<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Administrativo - CarreiraHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/painel-styles.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-header">
            <h1><i class="bi bi-shield-lock me-2"></i>Painel Admin</h1>
            <p>CarreiraHub</p>
        </div>

       

        <form id="loginAdminForm">
            <div class="mb-3">
                <label for="username" class="form-label">Email</label>
                <input type="email" class="form-control" id="email" placeholder="admin" required>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">Senha</label>
                <input type="password" class="form-control" id="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn btn-login btn-primary w-100 text-white">
                <i class="bi bi-box-arrow-in-right me-2"></i>Entrar no Painel
            </button>
        </form>

        <hr class="my-4">

        <p class="text-center text-muted small mb-0">
            Acesso restrito a administradores
        </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/auth-painel.js"></script>
    <script>
        if (adminAuth.isAuthenticated()) {
            window.location.href = 'dashboard.html';
        }

        document.getElementById('loginAdminForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const dataLogin = {
                email,
                password
            };

            try {
                const response = await fetch('http://127.0.0.1:3000/auth/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dataLogin)
                });

                const data = await response.json();
                console.log('Login response:', data);

                if (!response.ok || data.message) {
                    alert(data.message || 'Credenciais inválidas');
                    return;
                }

                // Garantir que idUser existe
                const adminId = data.idUser || data.id;
                console.log('Admin ID:', adminId);

                if (!adminId) {
                    alert('Erro: ID do admin não retornado pelo servidor');
                    return;
                }

                adminAuth.setAuth({
                    id: adminId,
                    username: data.username || 'admin',
                    email: data.email || email,
                    name: data.name || 'Administrador',
                    role: 'admin',
                    token: data.access_token || data.token || data.adminToken || 'token_' + Date.now()
                });

                // Armazenar o ID do admin para requisições posteriores
                localStorage.setItem('adminId', adminId);
                console.log('AdminId stored:', localStorage.getItem('adminId'));

                window.location.href = 'dashboard.html';
            } catch (error) {
                console.error('Erro ao fazer login:', error);
                alert('Ocorreu um erro ao tentar fazer login. Tente novamente.');
            }
        });
    </script>
</body>
</html>
